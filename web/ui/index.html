<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeContext — Semantic Index Visualizer</title>
  <meta name="description" content="Explore your codebase semantic index: browse nodes, descriptions, and call graphs." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --bg-panel:   #161b22;
      --bg-card:    #1c2128;
      --bg-hover:   #21262d;
      --bg-active:  #2d333b;
      --border:     #30363d;
      --border-2:   #444c56;
      --text:       #e6edf3;
      --text-muted: #8b949e;
      --text-dim:   #484f58;
      --accent:     #58a6ff;
      --accent-glow:rgba(88,166,255,.15);
      --green:      #3fb950;
      --green-bg:   rgba(63,185,80,.12);
      --yellow:     #d29922;
      --yellow-bg:  rgba(210,153,34,.12);
      --red:        #f85149;
      --red-bg:     rgba(248,81,73,.12);
      --purple:     #bc8cff;
      --orange:     #ffa657;
      --radius:     8px;
      --radius-lg:  12px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -.3px;
      color: var(--accent);
    }
    .logo span { color: var(--text-muted); font-weight: 400; }
    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Tree Panel ── */
    #tree-panel {
      width: 320px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-box {
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-box input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-dim); }

    #tree-container { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* ── Tree Nodes ── */
    .tree-node { user-select: none; }
    .tree-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px 3px 0;
      cursor: pointer;
      border-radius: var(--radius);
      margin: 1px 6px;
      transition: background .1s;
      position: relative;
    }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-row.active { background: var(--bg-active); }
    .tree-row.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px; bottom: 4px;
      width: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    .tree-toggle {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 10px;
      flex-shrink: 0;
      transition: transform .15s;
    }
    .tree-toggle.open { transform: rotate(90deg); }
    .tree-toggle.leaf { visibility: hidden; }

    .kind-icon { font-size: 13px; flex-shrink: 0; }
    .tree-label {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .status-badge {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-badge.fresh  { background: var(--green); }
    .status-badge.stale  { background: var(--yellow); }
    .status-badge.missing { background: var(--red); }

    .tree-children { overflow: hidden; }
    .tree-children.collapsed { display: none; }

    /* ── Detail Panel ── */
    #detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      gap: 12px;
      text-align: center;
    }
    .empty-state .icon { font-size: 48px; opacity: .3; }
    .empty-state p { font-size: 15px; }
    .empty-state small { color: var(--text-dim); font-size: 12px; }

    .detail-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
    }
    .detail-icon { font-size: 32px; flex-shrink: 0; margin-top: 4px; }
    .detail-title { flex: 1; }
    .detail-title h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.4px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }
    .detail-title .detail-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .status-pill.fresh  { background: var(--green-bg);  color: var(--green); }
    .status-pill.stale  { background: var(--yellow-bg); color: var(--yellow); }
    .status-pill.missing{ background: var(--red-bg);    color: var(--red); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* Meta grid */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .meta-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
    }
    .meta-card .meta-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .meta-card .meta-value {
      font-size: 13px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
    }

    /* Sections */
    .section {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-title {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-body { padding: 16px; }

    .description-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
    }

    .stale-warning {
      background: var(--yellow-bg);
      border: 1px solid rgba(210,153,34,.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--yellow);
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Edge list */
    .edge-list { display: flex; flex-direction: column; gap: 6px; }
    .edge-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      border: 1px solid transparent;
      font-size: 13px;
    }
    .edge-item:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    .edge-arrow { color: var(--text-muted); font-size: 11px; }
    .edge-id { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
    .edge-kind {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--bg-active);
      color: var(--text-muted);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-muted);
      gap: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    /* Kind colours */
    .kind-project  { color: var(--purple); }
    .kind-package  { color: var(--accent); }
    .kind-file     { color: var(--orange); }
    .kind-class    { color: #79c0ff; }
    .kind-function { color: var(--green); }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn .2s ease; }

    /* Hash display */
    .hash-val { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  </style>
</head>
<body>

<header>
  <div class="logo">Code<span>Context</span></div>
  <div id="header-stats" class="header-stats">
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div><span id="stat-fresh">–</span> fresh</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--yellow)"></div><span id="stat-stale">–</span> stale</div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div><span id="stat-missing">–</span> missing</div>
    <div class="stat-item" style="margin-left:8px">📄 <span id="stat-files">–</span> files</div>
    <div class="stat-item">🔗 <span id="stat-edges">–</span> edges</div>
  </div>
</header>

<div class="layout">

  <!-- Tree Panel -->
  <div id="tree-panel">
    <div class="panel-header">📂 Explorer</div>
    <div class="search-box">
      <input id="search-input" type="text" placeholder="Search symbols…" autocomplete="off" />
    </div>
    <div id="tree-container">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div id="detail-panel">
    <div class="empty-state">
      <div class="icon">🔍</div>
      <p>Select a node from the tree to view its description.</p>
      <small>Hover over nodes and click to explore your codebase index.</small>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allNodes = [];      // flat list for search
let activeId = null;

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ─── Icons & colours ─────────────────────────────────────────────────────────
const KIND_ICON = {
  project: '🌐', package: '📦', file: '📄', class: '🔷', function: '⚡'
};
const KIND_CLASS = {
  project: 'kind-project', package: 'kind-package',
  file: 'kind-file', class: 'kind-class', function: 'kind-function'
};
function statusDot(s) {
  return `<span class="status-badge ${s||'missing'}"></span>`;
}

// ─── Build tree node element ──────────────────────────────────────────────────
function buildTreeNode(node, depth = 0) {
  const hasChildren = node.children && node.children.length > 0;
  const indent = depth * 16;

  const el = document.createElement('div');
  el.className = 'tree-node';
  el.dataset.id = node.id;

  const row = document.createElement('div');
  row.className = 'tree-row';
  row.style.paddingLeft = `${8 + indent}px`;

  const toggle = document.createElement('div');
  toggle.className = 'tree-toggle' + (hasChildren ? '' : ' leaf');
  toggle.innerHTML = hasChildren ? '▶' : '▶';

  const icon = document.createElement('div');
  icon.className = 'kind-icon';
  icon.textContent = KIND_ICON[node.kind] || '◻';

  const label = document.createElement('div');
  label.className = `tree-label ${KIND_CLASS[node.kind] || ''}`;
  label.textContent = node.name;

  const dot = document.createElement('div');
  dot.innerHTML = statusDot(node.status);

  row.appendChild(toggle);
  row.appendChild(icon);
  row.appendChild(label);
  row.appendChild(dot);

  const childrenEl = document.createElement('div');
  childrenEl.className = 'tree-children collapsed';

  if (hasChildren) {
    // Start collapsed for deep nodes, expanded for top two levels
    if (depth < 2) {
      toggle.classList.add('open');
      childrenEl.classList.remove('collapsed');
    }
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      const open = toggle.classList.toggle('open');
      childrenEl.classList.toggle('collapsed', !open);
    });
    for (const child of node.children) {
      childrenEl.appendChild(buildTreeNode(child, depth + 1));
    }
  }

  row.addEventListener('click', () => selectNode(node.id));

  el.appendChild(row);
  el.appendChild(childrenEl);
  return el;
}

// ─── Flatten for search ───────────────────────────────────────────────────────
function flattenNodes(nodes, arr = []) {
  for (const n of nodes) {
    arr.push(n);
    if (n.children) flattenNodes(n.children, arr);
  }
  return arr;
}

// ─── Load tree ────────────────────────────────────────────────────────────────
async function loadTree() {
  try {
    const data = await api('/api/tree');
    const container = document.getElementById('tree-container');
    container.innerHTML = '';

    allNodes = flattenNodes(data.roots || []);

    if (!data.roots || data.roots.length === 0) {
      container.innerHTML = '<div style="padding:24px;color:var(--text-muted);font-size:13px">No nodes indexed yet.<br>Run <code>codecontext index</code> first.</div>';
      return;
    }

    for (const root of data.roots) {
      container.appendChild(buildTreeNode(root, 0));
    }
  } catch (e) {
    document.getElementById('tree-container').innerHTML =
      `<div style="padding:24px;color:var(--red);font-size:13px">Failed to load tree: ${e.message}</div>`;
  }
}

// ─── Load stats ───────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/api/status');
    document.getElementById('stat-fresh').textContent   = s.by_status?.fresh   ?? 0;
    document.getElementById('stat-stale').textContent   = s.by_status?.stale   ?? 0;
    document.getElementById('stat-missing').textContent = s.by_status?.missing  ?? 0;
    document.getElementById('stat-files').textContent   = s.total_files  ?? 0;
    document.getElementById('stat-edges').textContent   = s.total_edges  ?? 0;
  } catch {}
}

// ─── Select a node ────────────────────────────────────────────────────────────
async function selectNode(id) {
  // Highlight in tree
  document.querySelectorAll('.tree-row.active').forEach(r => r.classList.remove('active'));
  const targetRow = document.querySelector(`.tree-node[data-id="${CSS.escape(id)}"] > .tree-row`);
  if (targetRow) {
    targetRow.classList.add('active');
    targetRow.scrollIntoView({ block: 'nearest' });
  }

  activeId = id;
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';

  try {
    const node = await api(`/api/node/${encodeURIComponent(id)}`);
    renderDetail(node);
  } catch (e) {
    panel.innerHTML = `<div style="padding:24px;color:var(--red)">Failed to load node: ${e.message}</div>`;
  }
}

// ─── Render detail ────────────────────────────────────────────────────────────
function renderDetail(node) {
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'fade-in';

  const status = node.status || 'missing';

  // Header
  const header = document.createElement('div');
  header.className = 'detail-header';
  header.innerHTML = `
    <div class="detail-icon">${KIND_ICON[node.kind] || '◻'}</div>
    <div class="detail-title">
      <h1>${esc(node.name)}</h1>
      <div class="detail-subtitle">${esc(node.id)}</div>
    </div>
    <div class="status-pill ${status}">
      <div class="status-dot"></div>${status}
    </div>
  `;
  wrap.appendChild(header);

  // Stale warning
  if (status === 'stale') {
    const w = document.createElement('div');
    w.className = 'stale-warning';
    w.innerHTML = '⚠ Source has changed since this description was generated. Re-run <strong>codecontext index --incremental</strong>.';
    wrap.appendChild(w);
  }

  // Meta grid
  const meta = [
    { label: 'Kind',     value: node.kind },
    { label: 'Language', value: node.language || '—' },
    { label: 'File',     value: node.file_path || '—' },
    { label: 'Lines',    value: node.line_start ? `${node.line_start} – ${node.line_end}` : '—' },
    { label: 'Hash',     value: node.source_hash ? `<span class="hash-val">${esc(node.source_hash)}</span>` : '—' },
    { label: 'Updated',  value: node.updated_at ? esc(node.updated_at.replace('T',' ').replace(/\.\d+Z/,'Z')) : '—' },
  ];
  const grid = document.createElement('div');
  grid.className = 'meta-grid';
  for (const m of meta) {
    grid.innerHTML += `
      <div class="meta-card">
        <div class="meta-label">${m.label}</div>
        <div class="meta-value">${m.value}</div>
      </div>`;
  }
  wrap.appendChild(grid);

  // Description / Annotation
  const desc = node.annotation || node.description;
  const descSection = document.createElement('div');
  descSection.className = 'section';
  descSection.innerHTML = `
    <div class="section-title">📝 ${node.annotation ? 'Annotation' : 'Description'}</div>
    <div class="section-body">
      ${desc
        ? `<div class="description-text">${esc(desc)}</div>`
        : `<div style="color:var(--text-dim);font-size:13px">No description yet — run <strong>codecontext index</strong> to generate one.</div>`
      }
    </div>`;
  wrap.appendChild(descSection);

  // Edges
  const calls   = (node.calls    || []).filter(e => !e.to_node.startsWith('external::'));
  const calledBy= (node.called_by|| []).filter(e => !e.from_node.startsWith('external::'));

  if (calledBy.length > 0) {
    wrap.appendChild(buildEdgeSection('↙ Called by', calledBy, 'from_node'));
  }
  if (calls.length > 0) {
    wrap.appendChild(buildEdgeSection('↗ Calls', calls, 'to_node'));
  }

  panel.appendChild(wrap);
}

function buildEdgeSection(title, edges, nodeKey) {
  const section = document.createElement('div');
  section.className = 'section';
  const inner = document.createElement('div');
  inner.className = 'edge-list';
  for (const e of edges) {
    const target = e[nodeKey];
    const shortName = target.split('::').pop();
    const item = document.createElement('div');
    item.className = 'edge-item';
    item.innerHTML = `
      <span class="edge-arrow">${nodeKey === 'to_node' ? '→' : '←'}</span>
      <span class="edge-id">${esc(shortName)}</span>
      <span class="edge-kind">${esc(e.kind)}</span>`;
    item.addEventListener('click', () => {
      // Try to select the target in the tree
      const targetId = target;
      const treeNode = document.querySelector(`.tree-node[data-id="${CSS.escape(targetId)}"]`);
      if (treeNode) {
        selectNode(targetId);
      } else {
        // Try direct API load (might be in collapsed tree)
        selectNode(targetId);
      }
    });
    inner.appendChild(item);
  }
  section.innerHTML = `<div class="section-title">🔗 ${title}</div>`;
  section.appendChild(inner);
  return section;
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Search ───────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    // Restore all visibility
    document.querySelectorAll('.tree-node').forEach(el => el.style.display = '');
    return;
  }

  // Simple search: show/hide tree-rows
  document.querySelectorAll('.tree-node').forEach(el => {
    const id = el.dataset.id || '';
    const match = id.toLowerCase().includes(q);
    el.style.display = match ? '' : 'none';
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadTree();
loadStats();

// Auto-refresh stats every 30 s
setInterval(loadStats, 30000);
</script>
</body>
</html>
